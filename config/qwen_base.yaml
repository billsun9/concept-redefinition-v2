run:
  id: qwen25_7b_base_v2
  # Large intermediates such as activations.npz and dataset.jsonl.
  artifact_dir: results/qwen25_7b_base_v2
  # Small CSV, JSONL, metadata, and plot outputs.
  report_dir: results/qwen25_7b_base_v2
  seed: 13
model:
  name: Qwen/Qwen2.5-7B
  # null uses the standard Hugging Face cache. Set a path to override it.
  cache_dir: null
  device: auto
  dtype: bfloat16
  use_chat_template: false
  trust_remote_code: false
data:
  pairs_path: data/concept_pairs.jsonl
  categories_path: data/concept_categories.json
  max_pairs: 80
  templates_per_pair: 6
experiment:
  # Use selected layers for speed. Set to all for final runs.
  layers: [3, 7, 11, 15, 19, 23, 27]
  controls: [mapping, mention, negation, identity, reverse, unrelated]
  n_bootstrap: 1000
  use_centering: true
  activation_positions: [definition_source, definition_target, query_source, final_pre_answer, answer_label]
probe:
  test_size: 0.35
  regularization_C: 0.02
  n_random_label_controls: 50
mapping_detector:
  regularization_C: 0.02
  n_random_label_controls: 20
patching:
  layers: [7, 15, 23]
  alpha_values: [-1.0, -0.5, 0.0, 0.5, 1.0]
  direction_source: train_mean_delta
  controls: [true_delta, wrong_pair_delta, random_delta, source_replace]
  max_examples: 200
